<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cotizador Thinkora</title>

<style>

body{
font-family:system-ui;
background:#f5f5f5;
margin:0;
padding:20px;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

button{
background:black;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
}

.auth-overlay{
position:fixed;
inset:0;
background:#000000b0;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.auth-card{
background:white;
padding:30px;
border-radius:10px;
width:320px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="auth-overlay" id="loginOverlay">

<div class="auth-card">

<h2>Iniciar sesión</h2>

<input id="loginId" placeholder="ID de agente">

<input id="loginPass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<div id="loginMsg"></div>

</div>

</div>


<div class="wrap hidden" id="app">

<div class="card">

<h3>Datos del agente</h3>

<input id="agenteNombre" placeholder="Nombre">

<input id="agenteTelefono" placeholder="Teléfono">

<input id="agenteEmail" placeholder="Email">

</div>


<div class="card">

<h3>Cliente</h3>

<input id="cliente" placeholder="Nombre del cliente">

</div>


<div class="card">

<h3>Tipo de proyecto</h3>

<select id="tipo">
<option value="">Selecciona</option>
<option>Landing Page</option>
<option>Sitio Web</option>
<option>Ecommerce</option>
</select>

</div>


<div class="card">

<h3>Paquetes</h3>

<label>
<input type="checkbox" data-paquete="Diseño UX/UI">
Diseño UX/UI
</label>

<label>
<input type="checkbox" data-paquete="Desarrollo Web">
Desarrollo Web
</label>

<label>
<input type="checkbox" data-paquete="SEO inicial">
SEO inicial
</label>

</div>


<div class="card">

<button onclick="generarCotizacion()">Generar cotización</button>

<div id="resultado"></div>

</div>

</div>



<script>

/* ==============================
CONFIG
============================== */

const API_URL =
"https://script.google.com/macros/s/AKfycbz9NJuR1OsL5qTkLmizUE0e9MWxQK_XTqY-25O1ErlDgnQX8P3YpC6BH6uTyVoh5gvz/exec";


/* ==============================
LOGIN
============================== */

async function login(){

const id=document.getElementById("loginId").value;
const password=document.getElementById("loginPass").value;

const params=new URLSearchParams();

params.append("action","login");
params.append("id",id);
params.append("password",password);

const res=await fetch(API_URL,{
method:"POST",
body:params
});

const data=await res.json();

if(data.success){

localStorage.setItem("authUser",JSON.stringify(data.user));

iniciarApp();

}else{

document.getElementById("loginMsg").innerText=data.message;

}

}


/* ==============================
INICIAR APP
============================== */

function iniciarApp(){

const user=JSON.parse(localStorage.getItem("authUser"));

if(!user) return;

document.getElementById("loginOverlay").style.display="none";

document.getElementById("app").classList.remove("hidden");

document.getElementById("agenteNombre").value=user.nombre;

document.getElementById("agenteTelefono").value=user.telefono;

document.getElementById("agenteEmail").value=user.email;

}


/* ==============================
GENERAR COTIZACION
============================== */

async function generarCotizacion(){

const cliente=document.getElementById("cliente").value;

const tipo=document.getElementById("tipo").value;

const paquetes=[];

document.querySelectorAll('input[data-paquete]').forEach(cb=>{

if(cb.checked){

paquetes.push({
nombre:cb.dataset.paquete,
cantidad:1
});

}

});


const agente={

nombre:document.getElementById("agenteNombre").value,

telefono:document.getElementById("agenteTelefono").value,

email:document.getElementById("agenteEmail").value

};


const payload={
cliente,
tipoProyecto:tipo,
paquetes,
mantenimiento:[],
agente
};


const params=new URLSearchParams();

params.append("action","generarCotizacion");

params.append("payload",JSON.stringify(payload));


const res=await fetch(API_URL,{
method:"POST",
body:params
});

const data=await res.json();


if(data.success){

document.getElementById("resultado").innerHTML=
`<a href="${data.url}" target="_blank">Abrir cotización PDF</a>`;

}else{

alert("Error generando cotización");

}

}


/* ==============================
AUTOLOGIN
============================== */

document.addEventListener("DOMContentLoaded",()=>{

const user=localStorage.getItem("authUser");

if(user){

iniciarApp();

}

});

</script>

</body>
</html>
