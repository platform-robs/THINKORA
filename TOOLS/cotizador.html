<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thinkora Cotizador</title>

<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Comfortaa',sans-serif;
background:#434343;
color:#fff;
display:flex;
justify-content:center;
padding:20px;
}

.wrap{
width:900px;
max-width:95%;
}

.thinkora{
font-family:'Righteous';
font-size:4rem;
background:linear-gradient(90deg,#00b0ff,#76ff03);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
margin-top:40px;
}

.card{
margin-top:40px;
background:#fff;
color:#222;
border-radius:12px;
padding:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

.paquete{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00b0ff,#76ff03);
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#0b6cf5;
border-radius:8px;
display:none;
}

</style>

</head>

<body>

<div class="wrap">

<h1 class="thinkora">Thinkora</h1>

<div class="card">

<label>Cliente</label>
<input id="cliente">

<label>Tipo de proyecto</label>
<select id="tipo"></select>

<div id="paquetes"></div>

<label>Agente</label>
<input id="agenteNombre">
<input id="agenteTelefono">
<input id="agenteEmail">

<button onclick="generar()">GENERAR COTIZACIÓN</button>

<div id="resultado" class="result"></div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxFX54fOHKBtdXBwm6MdNu5Locs28ynwoaBotc5yts86PJuzSlMRVqAx437E5AgGqei/exec";

/* ======================== */
/* CARGAR TIPOS */
/* ======================== */

async function cargarTipos(){

const res=await fetch(API+"?action=tipos");

const tipos=await res.json();

const sel=document.getElementById("tipo");

sel.innerHTML="<option value=''>Selecciona</option>";

tipos.forEach(t=>{

const op=document.createElement("option");

op.value=t;

op.textContent=t;

sel.appendChild(op);

});

}

document.getElementById("tipo").addEventListener("change",cargarPaquetes);

/* ======================== */
/* CARGAR PAQUETES */
/* ======================== */

async function cargarPaquetes(){

const tipo=document.getElementById("tipo").value;

if(!tipo) return;

const res=await fetch(API+"?action=paquetes&tipo="+encodeURIComponent(tipo));

const paquetes=await res.json();

const div=document.getElementById("paquetes");

div.innerHTML="";

paquetes.forEach(p=>{

const row=document.createElement("div");

row.className="paquete";

row.innerHTML=`
<span>${p.paquete}</span>
<input type="checkbox" data-paquete="${p.paquete}">
`;

div.appendChild(row);

});

}

/* ======================== */
/* GENERAR */
/* ======================== */

async function generar(){

const cliente=document.getElementById("cliente").value;

const tipo=document.getElementById("tipo").value;

const paquetes=[];

document.querySelectorAll("#paquetes input:checked").forEach(cb=>{

paquetes.push({

nombre:cb.dataset.paquete,

cantidad:1

});

});

const agente={

nombre:document.getElementById("agenteNombre").value,

telefono:document.getElementById("agenteTelefono").value,

email:document.getElementById("agenteEmail").value

};

const payload={

cliente,

tipoProyecto:tipo,

paquetes,

mantenimiento:[],

agente

};

const params=new URLSearchParams();

params.append("action","generar");

params.append("payload",JSON.stringify(payload));

const res=await fetch(API,{

method:"POST",

body:params

});

const data=await res.json();

const r=document.getElementById("resultado");

r.style.display="block";

if(data.url){

r.innerHTML=`<a href="${data.url}" target="_blank">Descargar PDF</a>`;

}else{

r.innerHTML="Error generando cotización";

}

}

cargarTipos();

</script>

</body>
</html>
