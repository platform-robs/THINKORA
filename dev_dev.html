<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =====================================================
       CONFIGURACIÓN BÁSICA
  ====================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thinkora | En Desarrollo</title>
  <meta name="description" content="Thinkora - Sección en desarrollo.">
  <meta name="author" content="Salvador Robles">

  <!-- =====================================================
       FUENTES THINKORA
  ====================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- =====================================================
       CSS GLOBAL THINKORA
  ====================================================== -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    /* ============================================
       VARIABLES LOCALES
    ============================================ */
    :root {
      --radius-card: 16px;
      --radius-sm:   10px;
      --transition:  0.32s cubic-bezier(0.4, 0, 0.2, 1);
      --glow-blue:   rgba(0, 168, 198, 0.15);
    }

    /* ============================================
       ANIMACIONES
    ============================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-10px); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes progress-bar {
      from { width: 0%; }
      to   { width: 72%; }
    }

    /* ============================================
       HERO — CENTRADO
    ============================================ */
    .dev-hero {
      text-align: center;
      padding: 70px 0 50px;
      position: relative;
    }

    /* orb de fondo */
    .dev-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(0,168,198,0.1) 0%, transparent 68%);
      pointer-events: none;
      z-index: 0;
    }

    /* badge animado */
    .dev-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 168, 198, 0.08);
      border: 1px solid rgba(0, 168, 198, 0.22);
      border-radius: 100px;
      padding: 6px 20px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-blue);
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    .dev-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-blue);
      animation: dot-pulse 2s infinite;
    }

    /* título — usa .title de styles.css (Righteous + gradient) */
    .title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s 0.08s ease both;
    }

    .subtitle {
      font-family: 'Comfortaa', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 560px;
      margin: 0 auto 0;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    /* ============================================
       DIVISOR
    ============================================ */
    .section-divider {
      height: 1px;
      max-width: 500px;
      margin: 60px auto;
      background: linear-gradient(to right, transparent, var(--border-soft), transparent);
    }

    /* ============================================
       ÍCONO CENTRAL FLOTANTE
    ============================================ */
    .dev-icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 48px 0 40px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .dev-icon-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1px solid rgba(0,168,198,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    /* anillo exterior giratorio */
    .dev-icon-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px dashed rgba(0,168,198,0.2);
      animation: spin-slow 12s linear infinite;
    }

    .dev-icon-ring i {
      font-size: 2.8rem;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============================================
       CARD PRINCIPAL DE ESTADO
    ============================================ */
    .dev-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      padding: 36px 32px;
      max-width: 640px;
      margin: 0 auto 60px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    /* glow superior */
    .dev-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent-blue), transparent);
    }

    .dev-card h2 {
      font-family: 'Righteous', cursive;
      font-size: 1.4rem;
      color: var(--text-main);
      margin: 0 0 14px;
    }

    .dev-card p {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
      margin: 0 0 28px;
    }

    /* ── badge de estado ── */
    .dev-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,168,198,0.08);
      border: 1px solid rgba(0,168,198,0.22);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-blue);
    }

    .dev-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-blue);
      animation: dot-pulse 1.8s infinite;
    }

    /* ── barra de progreso ── */
    .dev-progress-wrap {
      margin-top: 28px;
    }

    .dev-progress-label {
      display: flex;
      justify-content: space-between;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .dev-progress-label span:last-child {
      color: var(--accent-blue);
    }

    .dev-progress-track {
      height: 4px;
      background: var(--border-soft);
      border-radius: 4px;
      overflow: hidden;
    }

    .dev-progress-fill {
      height: 100%;
      background: var(--gradient-main);
      border-radius: 4px;
      width: 0%;
      animation: progress-bar 1.4s 0.6s ease forwards;
    }

    /* ============================================
       ETIQUETA DE SECCIÓN
    ============================================ */
    .section-label {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 38px;
    }

    .section-label-line {
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    .section-label-text {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ============================================
       CARD "QUÉ SIGUE"
    ============================================ */
    .dev-next-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      padding: 32px;
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .dev-next-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(circle at top left, var(--glow-blue), transparent 65%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .dev-next-card:hover {
      border-color: var(--accent-blue);
      transform: translateY(-4px);
    }

    .dev-next-card:hover::after { opacity: 1; }

    .dev-next-icon {
      width: 46px;
      height: 46px;
      border-radius: var(--radius-sm);
      background: rgba(0,168,198,0.1);
      border: 1px solid rgba(0,168,198,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent-blue);
      flex-shrink: 0;
      transition: background var(--transition), transform var(--transition);
    }

    .dev-next-card:hover .dev-next-icon {
      background: rgba(0,168,198,0.2);
      transform: scale(1.08) rotate(-3deg);
    }

    .dev-next-body h2 {
      font-family: 'Righteous', cursive;
      font-size: 1.1rem;
      color: var(--text-main);
      margin: 0 0 10px;
    }

    .dev-next-body p {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
      margin: 0;
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 768px) {
      .dev-hero    { padding: 50px 0 30px; }
      .dev-card,
      .dev-next-card { padding: 26px 20px; }
      .dev-icon-ring { width: 90px; height: 90px; }
      .dev-icon-ring i { font-size: 2.2rem; }
    }
  </style>
</head>

<body>

  <!-- NAVBAR (integración existente — no modificar) -->
  <div id="navbar-container"></div>

  <main>

    <!-- ===================== HERO ===================== -->
    <section class="dev-hero">
      <div class="dev-eyebrow" data-i18n="dev.status"></div>
      <h1 class="title"    data-i18n="dev.title"></h1>
      <p  class="subtitle" data-i18n="dev.subtitle"></p>
    </section>

    <!-- ícono flotante -->
    <div class="dev-icon-wrap">
      <div class="dev-icon-ring">
        <i class="fa-solid fa-rocket"></i>
      </div>
    </div>

    <!-- ===================== CARD ESTADO ===================== -->
    <div class="dev-card">
      <h2 data-i18n="dev.cardTitle"></h2>
      <p  data-i18n="dev.cardText"></p>

      <div class="dev-status" data-i18n="dev.status"></div>

      <!-- Barra de progreso decorativa -->
      <div class="dev-progress-wrap">
        <div class="dev-progress-label">
          <span data-i18n="dev.progressLabel">Progreso</span>
          <span>72%</span>
        </div>
        <div class="dev-progress-track">
          <div class="dev-progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- ===================== QUÉ SIGUE ===================== -->
    <div class="section-label">
      <span class="section-label-line"></span>
      <span class="section-label-text" data-i18n="dev.nextTitle"></span>
      <span class="section-label-line"></span>
    </div>

    <div class="dev-next-card">
      <div class="dev-next-icon">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
      </div>
      <div class="dev-next-body">
        <h2 data-i18n="dev.nextTitle"></h2>
        <p  data-i18n="dev.nextText"></p>
      </div>
    </div>

  </main>

  <!-- FOOTER (integración existente — no modificar) -->
  <div id="footer-container"></div>

  <!-- =====================================================
       SCRIPTS — el orden importa
  ====================================================== -->
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>

</body>
</html>
