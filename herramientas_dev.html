<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =====================================================
       CONFIGURACIÓN BÁSICA
  ====================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Herramientas | Thinkora</title>
  <meta name="description" content="Accede a las herramientas internas de Thinkora. Panel de trabajo para el equipo.">
  <meta name="author" content="Salvador Robles">

  <!-- =====================================================
       FUENTES THINKORA
  ====================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- =====================================================
       CSS GLOBAL THINKORA
  ====================================================== -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    /* ============================================
       VARIABLES LOCALES
    ============================================ */
    :root {
      --radius-card: 16px;
      --radius-sm:   10px;
      --transition:  0.32s cubic-bezier(0.4, 0, 0.2, 1);
      --glow-blue:   rgba(0, 168, 198, 0.15);
      --glow-green:  rgba(79, 209, 122, 0.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* ============================================
       HERO
    ============================================ */
    .tools-hero {
      text-align: center;
      padding: 60px 0 40px;
      position: relative;
    }

    .tools-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 280px;
      background: radial-gradient(ellipse at center, rgba(0,168,198,0.1) 0%, transparent 68%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,168,198,0.08);
      border: 1px solid rgba(0,168,198,0.22);
      border-radius: 100px;
      padding: 6px 20px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-blue);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    .hero-eyebrow::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-blue);
      animation: dot-pulse 2s infinite;
    }

    .title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s 0.08s ease both;
    }

    .subtitle {
      font-family: 'Comfortaa', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 620px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .subtitle .highlight {
      font-weight: 700;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============================================
       DIVISOR Y ETIQUETA DE SECCIÓN
    ============================================ */
    .section-divider {
      height: 1px;
      max-width: 500px;
      margin: 60px auto;
      background: linear-gradient(to right, transparent, var(--border-soft), transparent);
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 38px;
    }
    .section-label-line {
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }
    .section-label-text {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ============================================
       BADGE DE PERMISO REQUERIDO
    ============================================ */
    .permission-notice {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,209,122,0.07);
      border: 1px solid rgba(79,209,122,0.2);
      border-radius: 100px;
      padding: 8px 20px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent-green);
      letter-spacing: 0.08em;
      margin: 24px auto 0;
      display: flex;
      width: fit-content;
      animation: fadeUp 0.6s 0.22s ease both;
    }

    /* ============================================
       GRID DE HERRAMIENTAS
    ============================================ */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 8px;
    }

    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      transition: border-color var(--transition), transform var(--transition);
      animation: fadeUp 0.5s ease both;
    }

    .tool-card:nth-child(1) { animation-delay: 0.04s; }
    .tool-card:nth-child(2) { animation-delay: 0.08s; }
    .tool-card:nth-child(3) { animation-delay: 0.12s; }
    .tool-card:nth-child(4) { animation-delay: 0.16s; }
    .tool-card:nth-child(5) { animation-delay: 0.20s; }
    .tool-card:nth-child(6) { animation-delay: 0.24s; }
    .tool-card:nth-child(7) { animation-delay: 0.28s; }

    .tool-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(circle at top left, var(--glow-blue), transparent 65%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .tool-card:hover {
      border-color: var(--accent-blue);
      transform: translateY(-5px);
    }

    .tool-card:hover::after { opacity: 1; }

    .tool-icon {
      width: 46px; height: 46px;
      border-radius: var(--radius-sm);
      background: rgba(0,168,198,0.1);
      border: 1px solid rgba(0,168,198,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent-blue);
      flex-shrink: 0;
      transition: background var(--transition), transform var(--transition);
    }

    .tool-card:hover .tool-icon {
      background: rgba(0,168,198,0.2);
      transform: scale(1.08) rotate(-3deg);
    }

    .tool-card h3 {
      font-family: 'Righteous', cursive;
      font-size: 1.05rem;
      color: var(--text-main);
      margin: 0;
    }

    .tool-card p {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.65;
      margin: 0;
    }

    /* badge de equipo requerido */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.6;
      margin-top: auto;
    }

    .tool-badge i { font-size: 0.6rem; }

    /* card especial: Crear Usuario */
    .tool-card.cta-card {
      background: linear-gradient(135deg, rgba(0,168,198,0.12), rgba(79,209,122,0.08));
      border-color: rgba(0,168,198,0.3);
      align-items: center;
      text-align: center;
    }

    .tool-card.cta-card:hover {
      border-color: var(--accent-green);
      background: linear-gradient(135deg, rgba(0,168,198,0.18), rgba(79,209,122,0.14));
    }

    .tool-card.cta-card .tool-icon {
      background: rgba(79,209,122,0.12);
      border-color: rgba(79,209,122,0.25);
      color: var(--accent-green);
      width: 52px; height: 52px;
      font-size: 1.3rem;
    }

    .tool-card.cta-card h3 {
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============================================
       SECCIÓN ÚNETE AL EQUIPO
    ============================================ */
    .join-card {
      background: var(--bg-card);
      border: 1px solid rgba(0,168,198,0.25);
      border-radius: var(--radius-card);
      padding: 48px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .join-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent-blue), transparent);
    }

    .join-card::after {
      content: '';
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 200px;
      background: radial-gradient(ellipse, rgba(0,168,198,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .join-card h2 {
      font-family: 'Righteous', cursive;
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: var(--text-main);
      margin: 0 0 12px;
      position: relative; z-index: 1;
    }

    .join-card h2 .hl {
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .join-card p {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 560px;
      margin: 0 auto 28px;
      position: relative; z-index: 1;
    }

    /* equipos disponibles */
    .teams-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
      position: relative; z-index: 1;
    }

    .team-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      padding: 6px 16px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: border-color var(--transition), color var(--transition);
    }

    .team-pill:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .team-pill i { font-size: 0.75rem; }

    /* botones CTA de unirse */
    .join-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative; z-index: 1;
    }

    .join-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      border-radius: 100px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .join-btn:hover { transform: translateY(-3px); }

    .join-btn.primary {
      background: var(--gradient-main);
      color: #0b0b0b;
    }

    .join-btn.primary:hover {
      box-shadow: 0 8px 24px rgba(0,168,198,0.3);
    }

    .join-btn.whatsapp {
      background: transparent;
      border: 1px solid rgba(37,211,102,0.3);
      color: #25d366;
    }

    .join-btn.whatsapp:hover {
      border-color: #25d366;
      box-shadow: 0 8px 24px rgba(37,211,102,0.2);
    }

    .join-btn.email-btn {
      background: transparent;
      border: 1px solid var(--border-soft);
      color: var(--text-main);
    }

    .join-btn.email-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* ============================================
       FAQ
    ============================================ */
    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 820px;
      margin: 0 auto;
    }

    .faq-item {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: border-color var(--transition);
      animation: fadeUp 0.5s ease both;
    }

    .faq-item:nth-child(1) { animation-delay: 0.05s; }
    .faq-item:nth-child(2) { animation-delay: 0.10s; }
    .faq-item:nth-child(3) { animation-delay: 0.15s; }
    .faq-item:nth-child(4) { animation-delay: 0.20s; }
    .faq-item:nth-child(5) { animation-delay: 0.25s; }
    .faq-item:nth-child(6) { animation-delay: 0.30s; }

    .faq-item.active { border-color: var(--accent-blue); }

    .faq-question {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      cursor: pointer;
      gap: 16px;
    }

    .faq-question-text {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-main);
      text-align: left;
    }

    .faq-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(0,168,198,0.1);
      border: 1px solid rgba(0,168,198,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--accent-blue);
      flex-shrink: 0;
      transition: transform var(--transition), background var(--transition);
    }

    .faq-item.active .faq-icon {
      transform: rotate(180deg);
      background: rgba(0,168,198,0.2);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .faq-item.active .faq-answer { max-height: 300px; }

    .faq-answer-inner {
      padding: 16px 22px 20px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
      border-top: 1px solid var(--border-soft);
    }

    /* ============================================
       MODAL CREAR USUARIO
    ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 20px;
    }

    .modal {
      background: linear-gradient(145deg, var(--bg-card), #0f172a);
      padding: 36px 32px;
      border-radius: 20px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--border-soft);
      box-shadow: 0 25px 70px rgba(0,0,0,.7);
    }

    .modal h2 {
      font-family: 'Righteous', cursive;
      font-size: 1.4rem;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 22px;
    }

    .modal input,
    .modal select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.88rem;
      transition: .2s ease;
      box-sizing: border-box;
    }

    .modal input:focus,
    .modal select:focus {
      outline: none;
      border-color: var(--accent-blue);
      background: rgba(0,168,198,0.06);
    }

    .modal select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='white'%3E%3Cpath d='M4 6l4 4 4-4z'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px;
      cursor: pointer;
    }

    .modal select option {
      background-color: #0f172a;
      color: white;
    }

    .modal-btn-primary {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: none;
      background: var(--gradient-main);
      font-family: 'Comfortaa', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: #0b0b0b;
      cursor: pointer;
      transition: .2s ease;
      margin-bottom: 10px;
    }

    .modal-btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .modal-btn-secondary {
      width: 100%;
      padding: 11px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: transparent;
      font-family: 'Comfortaa', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: .2s ease;
    }

    .modal-btn-secondary:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* ============================================
       MODAL PORTAFOLIO
    ============================================ */
    .modal-links {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }

    .modal-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      text-decoration: none;
      color: var(--text-main);
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all .25s ease;
    }

    .modal-links a:hover {
      background: rgba(0,168,198,0.1);
      border-color: var(--accent-blue);
      transform: translateY(-2px);
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 768px) {
      .tools-hero      { padding: 50px 0 30px; }
      .tools-grid      { grid-template-columns: 1fr; }
      .join-card       { padding: 36px 20px; }
      .join-buttons    { flex-direction: column; align-items: center; }
      .join-btn        { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <main>

    <!-- ===================== HERO ===================== -->
    <section class="tools-hero">
      <div class="hero-eyebrow" data-i18n="toolsPage.eyebrow"></div>
      <h1 class="title" data-i18n="toolsPage.title"></h1>
      <p  class="subtitle" data-i18n="toolsPage.intro"></p>
      <div class="permission-notice">
        <i class="fa-solid fa-shield-halved"></i>
        <span data-i18n="toolsPage.permissionNotice"></span>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- ===================== HERRAMIENTAS ===================== -->
    <div class="section-label">
      <span class="section-label-line"></span>
      <span class="section-label-text" data-i18n="toolsPage.sectionLabel"></span>
      <span class="section-label-line"></span>
    </div>

    <div class="tools-grid">

      <!-- ⚠️ Tareas — cambiar URL cuando esté lista -->
      <!-- const TAREAS_URL = "URL_AQUI"; -->
      <div class="tool-card" onclick="window.location.href='dev.html'">
        <div class="tool-icon"><i class="fa-solid fa-list-check"></i></div>
        <h3 data-i18n="toolsPage.cards.tasks"></h3>
        <p  data-i18n="toolsPage.descriptions.tasks"></p>
        <span class="tool-badge"><i class="fa-solid fa-lock"></i> <span data-i18n="toolsPage.allTeams"></span></span>
      </div>

      <!-- ⚠️ Cotizador — cambiar URL cuando esté lista -->
      <!-- const COTIZADOR_URL = "URL_AQUI"; -->
      <div class="tool-card" onclick="window.location.href='dev.html'">
        <div class="tool-icon"><i class="fa-solid fa-calculator"></i></div>
        <h3 data-i18n="toolsPage.cards.quote"></h3>
        <p  data-i18n="toolsPage.descriptions.quote"></p>
        <span class="tool-badge"><i class="fa-solid fa-lock"></i> <span data-i18n="toolsPage.allTeams"></span></span>
      </div>

      <!-- ⚠️ Ver Cotizaciones — cambiar URL cuando esté lista -->
      <!-- const VER_COTIZACIONES_URL = "URL_AQUI"; -->
      <div class="tool-card" onclick="window.location.href='dev.html'">
        <div class="tool-icon"><i class="fa-solid fa-file-lines"></i></div>
        <h3 data-i18n="toolsPage.cards.viewQuotes"></h3>
        <p  data-i18n="toolsPage.descriptions.viewQuotes"></p>
        <span class="tool-badge"><i class="fa-solid fa-lock"></i> <span data-i18n="toolsPage.allTeams"></span></span>
      </div>

      <!-- ⚠️ Generar Propuesta — cambiar URL cuando esté lista -->
      <!-- const PROPUESTA_URL = "URL_AQUI"; -->
      <div class="tool-card" onclick="window.location.href='dev.html'">
        <div class="tool-icon"><i class="fa-solid fa-file-signature"></i></div>
        <h3 data-i18n="toolsPage.cards.techGen"></h3>
        <p  data-i18n="toolsPage.descriptions.techGen"></p>
        <span class="tool-badge"><i class="fa-solid fa-lock"></i> <span data-i18n="toolsPage.allTeams"></span></span>
      </div>

      <!-- ⚠️ Ver Propuestas — cambiar URL cuando esté lista -->
      <!-- const VER_PROPUESTAS_URL = "URL_AQUI"; -->
      <div class="tool-card" onclick="window.location.href='dev.html'">
        <div class="tool-icon"><i class="fa-solid fa-folder-open"></i></div>

  <!-- =====================================================
       MODAL CREAR USUARIO
       ─────────────────────────────────────────────────────
       INTEGRACIÓN EN OTRAS PÁGINAS:
       Para usar este modal en nosotros.html o contacto.html:

       1. Copia el bloque <div class="modal-overlay" id="userModal">
          completo hasta su </div> final y pégalo en la página.

       2. Copia también el bloque <iframe name="hidden_iframe">

       3. En el <head> de esa página agrega los estilos del modal:
          .modal-overlay { ... }  .modal { ... } etc.
          O mejor: mueve esos estilos a styles.css para compartirlos.

       4. Llama openUserModal() desde cualquier botón:
          <button onclick="openUserModal()">Únete al equipo</button>

       5. Asegúrate de que i18n.js se carga en esa página
          para que los placeholders traduzcan correctamente.

       6. El script handleSubmit() también debe copiarse
          o moverse a un archivo JS compartido (ej. user-modal.js).
  ====================================================== -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">

      <h2 data-i18n="toolsPage.registerModal.title"></h2>

      <!--
        ⚠️ GOOGLE SHEETS INTEGRATION
        Hoja: Registros
        URL del Apps Script:
        https://script.google.com/macros/s/AKfycbyyriFyvjjsYm30sDqyHfj87woIiW6eCYB8KJDDmMczb9mSqB2Bxsatytq4YMZaUaxj/exec

        Columnas que se llenan:
        Nombre | Apellido Paterno | Apellido Materno | Teléfono |
        Correo | Contraseña | Equipo | id | Estado | Fecha de registro

        Estado siempre = "Pendiente"
        id = 3 letras + 3 números aleatorio (ej. ABC123)
        Nombre y apellidos siempre en MAYÚSCULAS
      -->
      <form id="userForm"
        action="https://script.google.com/macros/s/AKfycbyyriFyvjjsYm30sDqyHfj87woIiW6eCYB8KJDDmMczb9mSqB2Bxsatytq4YMZaUaxj/exec"
        method="POST"
        target="hidden_iframe"
        onsubmit="handleSubmit(event)">

        <input name="nombre"    type="text"     data-i18n="toolsPage.register.name"            placeholder="">
        <input name="apellidoP" type="text"     data-i18n="toolsPage.register.lastName1"        placeholder="">
        <input name="apellidoM" type="text"     data-i18n="toolsPage.register.lastName2"        placeholder="">
        <input name="telefono"  type="tel"      data-i18n="toolsPage.register.phone"            placeholder="">
        <input name="correo"    type="email"    data-i18n="toolsPage.register.email"            placeholder="">
        <input name="password"  type="password" id="pass1" data-i18n="toolsPage.register.password" placeholder="">
        <input                  type="password" id="pass2" data-i18n="toolsPage.register.confirmPassword" placeholder="">

        <!-- Campo oculto: se llena automáticamente con JS -->
        <input name="id"     type="hidden" id="generatedId">
        <input name="estado" type="hidden" value="Pendiente">
        <input name="fecha"  type="hidden" id="regDate">

        <select name="equipo" required>
          <option value="" data-i18n="toolsPage.registerModal.selectTeam"></option>
          <option value="Sales">Sales</option>
          <option value="Tech">Tech</option>
          <option value="Design">Design</option>
          <option value="Marketing">Marketing</option>
          <option value="Admin">Admin</option>
        </select>

        <button type="submit" class="modal-btn-primary" id="submitBtn"
                data-i18n="toolsPage.register.submit"></button>

      </form>

      <button class="modal-btn-secondary" onclick="closeUserModal()"
              data-i18n="toolsPage.registerModal.cancel"></button>

    </div>
  </div>

  <script src="assets/js/i18n.js"></script>

  <script>

    /* ── FAQ ACCORDION ── */
    document.querySelectorAll('.faq-question').forEach(q => {
      q.addEventListener('click', () => {
        const item   = q.parentElement;
        const isOpen = item.classList.contains('active');
        document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('active'));
        if (!isOpen) item.classList.add('active');
      });
    });

    /* ── Cerrar modales al click fuera ── */
    document.addEventListener('click', e => {
      document.querySelectorAll('.modal-overlay').forEach(overlay => {
        if (e.target === overlay) overlay.style.display = 'none';
      });
    });

    /* ── PORTAFOLIO ── */
    function openProjects()  { document.getElementById('projectsModal').style.display = 'flex'; }
    function closeProjects() { document.getElementById('projectsModal').style.display = 'none'; }

    /* ── MODAL CREAR USUARIO ── */
    function openUserModal()  { document.getElementById('userModal').style.display = 'flex'; }
    function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }

    /* ── GENERADOR DE ID ÚNICO: 3 letras + 3 números ── */
    function generateId() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const numbers = '0123456789';
      let id = '';
      for (let i = 0; i < 3; i++) id += letters[Math.floor(Math.random() * letters.length)];
      for (let i = 0; i < 3; i++) id += numbers[Math.floor(Math.random() * numbers.length)];
      return id;
    }

    /* ── MANEJO DEL FORMULARIO ── */
    function handleSubmit(event) {
      event.preventDefault();

      const form    = document.getElementById('userForm');
      const btn     = document.getElementById('submitBtn');
      const nombre  = form.nombre;
      const apP     = form.apellidoP;
      const apM     = form.apellidoM;
      const tel     = form.telefono;
      const correo  = form.correo;
      const equipo  = form.equipo.value;
      const p1      = document.getElementById('pass1');
      const p2      = document.getElementById('pass2');

      /* Validar teléfono 10 dígitos */
      if (!/^[0-9]{10}$/.test(tel.value)) {
        alert(t('alerts.phone')); return;
      }

      /* Validar email */
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo.value)) {
        alert(t('alerts.invalidEmail')); return;
      }

      /* Validar contraseña mínimo 8 caracteres */
      if (p1.value.length < 8) {
        alert(t('alerts.passwordLength')); return;
      }

      /* Validar que coincidan contraseñas */
      if (p1.value !== p2.value) {
        alert(t('alerts.passwordMismatch')); return;
      }

      /* Convertir a mayúsculas */
      nombre.value = nombre.value.toUpperCase().trim();
      apP.value    = apP.value.toUpperCase().trim();
      apM.value    = apM.value.toUpperCase().trim();

      /* Generar ID y fecha */
      const id   = generateId();
      const hoy  = new Date();
      const fecha = `${hoy.getDate()}/${hoy.getMonth()+1}/${hoy.getFullYear()}`;

      document.getElementById('generatedId').value = id;
      document.getElementById('regDate').value      = fecha;

      /* Deshabilitar botón */
      btn.disabled  = true;
      btn.innerText = t('toolsPage.register.disabled') || 'Enviando...';

      /* Enviar al Google Apps Script */
      form.submit();

      /* Notificación WhatsApp al admin */
      /* ⚠️ Cambiar número si cambia el WhatsApp admin */
      const msg = encodeURIComponent(
        `Nuevo registro Thinkora:\n\nNombre: ${nombre.value} ${apP.value}\nEquipo: ${equipo}\nID: ${id}\nCorreo: ${correo.value}`
      );
      window.open(`https://wa.me/5214465165882?text=${msg}`, '_blank');

      /* Mensaje de confirmación */
      alert(t('toolsPage.register.success'));

      /* Reset */
      form.reset();
      btn.disabled  = false;
      btn.innerText = t('toolsPage.register.submit') || 'Enviar solicitud';
      closeUserModal();
    }

  </script>
